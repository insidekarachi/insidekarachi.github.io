<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * {
           transition: .33s ease all;
           box-sizing: border-box;
        }
        
        html {
           font-family: "Helvetica Neue", "Arial";
           box-sizing: border-box;
        }
        
        span {
           display: inline-block;
           width: 50px;
           height: 5px;
           background-color: #2D58C4;
           margin-bottom: 30px;
        }
        
        img {
           width: 100%;
        }
        
        h1 {
           font-weight: 600;
           font-size: 36px;
           margin: 0 0 15px;
        }
        
        p {
           font-weight: 400;
           line-height: 24px;
           margin: 0 0 15px 0;
        }
        
        a {
           text-decoration: none;
           text-transform: uppercase;
           color: #2D58C4;
           font-weight: bold;
           font-size: 12px;
           position: relative;
           display: inline-block;
           z-index: 1;
           padding: 5px;
           left: -5px;
        }
        
        a:hover {
           color: #2D58C4;
        }
        
        a::before {
           content: '';
           z-index: -1;
        	position: absolute;
        	top: calc(50%);
        	left: 0;
        	width: 100%;
        	height: 40%;
        	pointer-events: none;
        	background: #B7CCFF;
        	transform: scale3d(0,1,1);
        	transform-origin: 0% 50%;
        	transition: transform 0.33s;
        }
        
        a:hover::before {
           transform: scale3d(1,1,1);
        	transform-origin: 0% 50%;
        }
        
        div.site {
           background-color: #f2f2f2;
           height: 100vh;
           display: flex;
           align-items: center;
           justify-content: center;
           background-image: linear-gradient(210deg, #FB8E2A, #FDC154);
        }
        
        
        div.container {
           background-color: white;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           margin: 30px;
           box-shadow: 0 8px 16px rgba(black, .45);
        }
        div.img {
           height: 300px;
           width: 100%;
           background: url("./huda.jpg");
           background-position: center;
           background-size: contain;
        }
        div.text-container {
           margin: 60px 45px 55px;
        }
        @media screen and (min-width: 768px) {
          div.container {
            flex-direction: row;
             width: 100%;
          }
           
           div.img {
              height: 420px;
              min-width: 360px;
           }
           
           div.text-container {
              margin: 0 60px;
              max-width: 660px;
           }
        }
        
        @media screen and (min-width: 1024px) {
           div.container {
              max-width: 1200px;
           }
        }
        
        @media screen and (min-width: 1200px) {
        }
    </style>
</head>
    <body>
        <div class="site">
           <div class="container">
              <div class="img"></div>
              <div class="text-container">
                 <span></span>
                 <h1>Hello, My Name is Huda</h1>
                 <p>I am a Computer Engineer</p>
              </div>
           </div>
        </div>    
    </body>
</html>
